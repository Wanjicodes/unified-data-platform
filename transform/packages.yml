# packages.yml
#
# External dbt packages this project depends on.
# Run 'dbt deps' to install these into the dbt_packages/ folder.
#
# dbt_utils is the most commonly-used package in the dbt ecosystem —
# it provides reusable tests and macros (accepted_range, unique_combination,
# generate_surrogate_key, pivot, etc.) that you would otherwise have to write
# from scratch.

packages:
  - package: dbt-labs/dbt_utils
    version: [">=1.1.0", "<2.0.0"]
